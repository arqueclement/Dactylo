<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1f8a70">
    <title>Dactilo Pracsi</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <section id="loginScreen" class="login-screen" aria-label="Connexion">
      <form id="loginForm" class="login-card">
        <p class="eyebrow">Connexion</p>
        <h1>Dactilo Pracsi</h1>
        <label>
          Identifiant
          <input id="loginId" type="text" autocomplete="username" required>
        </label>
        <label>
          Code
          <input id="loginCode" type="password" inputmode="numeric" autocomplete="current-password" required>
        </label>
        <p id="loginError" class="login-error" role="alert" hidden>Identifiant ou code incorrect.</p>
        <button type="submit">Se connecter</button>
      </form>
    </section>

    <main id="appScreen" class="app" hidden>
      <section class="practice">
        <div class="topbar">
          <div>
            <p class="eyebrow">Entrainement clavier</p>
            <h1>Dactilo Pracsi</h1>
          </div>
          <div class="top-actions">
            <span id="userBadge" class="user-badge">Eleve</span>
            <button id="logoutBtn" class="icon-btn" type="button" title="Deconnexion" aria-label="Deconnexion">
              X
            </button>
            <button id="resetBtn" class="icon-btn" type="button" title="Recommencer" aria-label="Recommencer">
              &#8635;
            </button>
          </div>
        </div>

        <div class="stats" aria-label="Statistiques">
          <div>
            <span id="wpm">0</span>
            <small>mots/min</small>
          </div>
          <div>
            <span id="accuracy">100%</span>
            <small>precision</small>
          </div>
          <div>
            <span id="timer">60</span>
            <small>secondes</small>
          </div>
        </div>

        <div class="lesson-card">
          <div>
            <p id="stageLabel" class="eyebrow">Etape 1</p>
            <h2 id="stageTitle">Depart</h2>
          </div>
          <div class="goal">
            <span id="stageGoal">Objectif : terminer le texte</span>
            <div class="progress-track" aria-hidden="true">
              <span id="stageProgress"></span>
            </div>
          </div>
        </div>

        <div id="quote" class="quote" aria-label="Texte a recopier"></div>

        <textarea
          id="typingInput"
          spellcheck="false"
          autocomplete="off"
          autocapitalize="off"
          placeholder="Tape le texte ici pour commencer..."
          aria-label="Zone de saisie"
        ></textarea>

        <div class="controls">
          <button id="previousStageBtn" type="button" aria-label="Etape precedente">&lt;</button>
          <button id="newTextBtn" type="button">Nouveau texte</button>
          <button id="nextStageBtn" type="button" aria-label="Etape suivante">&gt;</button>
        </div>
      </section>

      <aside class="path-panel" aria-label="Chemin de progression">
        <div class="keyboard__glow"></div>
        <div class="path-head">
          <p class="eyebrow">Parcours</p>
          <h2>Route dactilo</h2>
          <small id="overallProgress">0 / 42 niveaux termines</small>
        </div>
        <div id="pathMap" class="path-map"></div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
